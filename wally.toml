[package]
name = "willi/gear-rng"
version = "0.1.0"
registry = "https://github.com/upliftgames/wally-index"
realm = "server"
description = "Gear RNG — Diablo-style loot simulator for Roblox"

[dependencies]
# Networking & Events
Signal = "sleitnick/signal@2.0.3"
Comm = "sleitnick/comm@1.0.1"
Trove = "sleitnick/trove@1.8.0"

# Async
Promise = "evaera/promise@4.0.0"

# Data Persistence
ProfileStore = "sekuriyo-lotus/profilestore@1.0.4"

# Zone Detection (chest activation, mob spawns, world transitions)
ZonePlus = "bintrannz/zoneplus@9.9.9"

# UI Framework
React = "jsdotlua/react@17.2.1"
ReactRoblox = "jsdotlua/react-roblox@17.2.1"

[dev-dependencies]
TestEZ = "roblox/testez@0.4.1"
